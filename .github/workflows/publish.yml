name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# pub.dev requires a credentials file at ~/.config/dart/pub-credentials.json
# with refresh + access tokens minted by `flutter pub token add`. We
# materialize that file at runtime from two secrets and then run
# `flutter pub publish --force`. The credentials write + publish steps
# both skip cleanly when the secrets aren't set.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUB_DEV_PUBLISH_ACCESS_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_ACCESS_TOKEN }}
      PUB_DEV_PUBLISH_REFRESH_TOKEN: ${{ secrets.PUB_DEV_PUBLISH_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.19.0
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter pub publish --dry-run
      - name: Write pub.dev credentials
        if: env.PUB_DEV_PUBLISH_ACCESS_TOKEN != '' && env.PUB_DEV_PUBLISH_REFRESH_TOKEN != ''
        run: |
          mkdir -p ~/.config/dart
          cat > ~/.config/dart/pub-credentials.json <<EOF
          {
            "accessToken":"${{ secrets.PUB_DEV_PUBLISH_ACCESS_TOKEN }}",
            "refreshToken":"${{ secrets.PUB_DEV_PUBLISH_REFRESH_TOKEN }}",
            "tokenEndpoint":"https://accounts.google.com/o/oauth2/token",
            "scopes":["openid","https://www.googleapis.com/auth/userinfo.email"],
            "expiration":1
          }
          EOF
      - name: Publish to pub.dev
        if: env.PUB_DEV_PUBLISH_ACCESS_TOKEN != '' && env.PUB_DEV_PUBLISH_REFRESH_TOKEN != ''
        run: flutter pub publish --force
      - name: Skip publish (no pub.dev tokens)
        if: env.PUB_DEV_PUBLISH_ACCESS_TOKEN == '' || env.PUB_DEV_PUBLISH_REFRESH_TOKEN == ''
        run: |
          echo "::notice::PUB_DEV_PUBLISH_ACCESS_TOKEN or PUB_DEV_PUBLISH_REFRESH_TOKEN not set; skipping publish."
          echo "Mint via 'flutter pub token add https://pub.dev', then set both in Settings → Secrets."
