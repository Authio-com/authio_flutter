name: authio
description: >-
  Authio Flutter SDK — passwordless, multi-org authentication. Native passkeys
  via package:passkeys (iOS ASAuthorization + Android Credential Manager),
  OAuth via the system browser, magic links, and secure session storage.
version: 0.1.0
homepage: https://authio.com
repository: https://github.com/authio-com/authio_flutter
issue_tracker: https://github.com/authio-com/authio_flutter/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  # Native passkey ceremonies. iOS ASAuthorization + Android Credential
  # Manager. Versioned loosely because the API has historically shifted; the
  # SDK adapter (lib/src/passkey.dart) handles minor breakage.
  passkeys: ^3.0.0
  url_launcher: ^6.2.0
  app_links: ^6.0.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0
  test: ^1.24.0

# Pure-Dart parts of the SDK live under lib/src; the public surface is
# re-exported from lib/authio.dart.
flutter:
  # No assets — pure code package.
